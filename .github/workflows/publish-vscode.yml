name: Publish VSCode Extension

on:
  release:
    types: [published]
  # Manual escape hatch: run the packaging from the current branch
  # tree against an existing release tag (release-event runs check
  # out the frozen tag tree, so a packaging fix on main can only be
  # exercised via dispatch).
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to package and upload (e.g. v1.6.0)"
        required: true
        type: string

jobs:
  publish-vscode:
    name: Publish Extension
    if: github.event_name == 'workflow_dispatch' || !github.event.release.prerelease
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install publishing tools
        run: npm install -g @vscode/vsce ovsx

      - name: Download WASM from release
        run: |
          mkdir -p lus-vscode/wasm
          cd lus-vscode/wasm
          gh release download "$TAG" \
            --pattern "lus.node.js" --pattern "lus.wasm" \
            --repo "${{ github.repository }}" || {
            echo "WASM assets not found in release, building from source..."
            cd ../../lus/wasm
            ./build.sh node
            cp dist/lus.node.js ../../lus-vscode/wasm/lus.node.js
            cp dist/lus.wasm ../../lus-vscode/wasm/lus.wasm
          }
          [ -f lus.node.js ] && mv lus.node.js lus.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Prepare language server files
        run: cp -r lus-language lus-vscode/lus-language

      - name: Set version from release tag
        run: |
          VERSION="${TAG#v}"
          cd lus-vscode
          npm version "$VERSION" --no-git-tag-version --allow-same-version
        env:
          TAG: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Build extension
        run: |
          cd lus-vscode
          npm install
          npm run prebuild
          npm run build

      - name: Package extension
        run: |
          cd lus-vscode
          vsce package
          echo "VSIX=$(ls *.vsix)" >> $GITHUB_ENV

      - name: Publish to Open VSX
        run: ovsx publish "lus-vscode/${{ env.VSIX }}"
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}

      - name: Upload .vsix to release
        run: |
          gh release upload "$TAG" \
            "lus-vscode/${{ env.VSIX }}" \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
