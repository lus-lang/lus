name: Install script E2E

# Runs install.sh against real GitHub releases, so it is deliberately
# decoupled from the main CI: network flakiness or a half-published
# release must not block unrelated pushes.
on:
  push:
    branches: [main]
    paths:
      - "lus-install/**"
      - ".github/workflows/install-test.yml"
  pull_request:
    branches: [main]
    paths:
      - "lus-install/**"
      - ".github/workflows/install-test.yml"
  workflow_dispatch:

jobs:
  # The strict end-to-end run targets the latest unstable release:
  # those binaries are self-contained from the moment the static-link
  # change lands on main, while stable releases only catch up at
  # v1.6.0. Unstable releases are best-effort partial — the release
  # job ships whatever platform builds succeeded — so resolve also
  # reports which assets exist and each platform skips its strict run
  # (loudly) when its binary is absent rather than 404-failing.
  resolve:
    name: Resolve unstable tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.find.outputs.tag }}
      # comma-wrapped asset list (",a,b,c,") so contains() can match
      # ",lus-linux," without also matching lus-linux-musl
      assets: ${{ steps.find.outputs.assets }}
    steps:
      - id: find
        run: |
          rel=$(gh api repos/lus-lang/lus/releases --jq '[.[] | select(.prerelease)][0]')
          tag=$(jq -r '.tag_name // empty' <<<"$rel")
          assets=$(jq -r '[.assets[].name] | join(",")' <<<"$rel")
          echo "unstable tag: ${tag:-<none>}"
          echo "assets: $assets"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "assets=,$assets," >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

  e2e:
    name: E2E (${{ matrix.platform }})
    needs: resolve
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container || null }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-glibc
            runner: ubuntu-latest
            asset: lus-linux
          - platform: linux-musl
            runner: ubuntu-latest
            container: alpine:latest
            asset: lus-linux-musl
          - platform: macos
            runner: macos-14
            asset: lus-macos

    steps:
      - name: Install curl (Alpine)
        if: matrix.container == 'alpine:latest'
        run: apk add --no-cache curl

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install latest unstable (strict)
        if: needs.resolve.outputs.tag != '' && contains(needs.resolve.outputs.assets, format(',{0},', matrix.asset))
        shell: sh
        run: |
          sh lus-install/install.sh --version "${{ needs.resolve.outputs.tag }}" --dir "$PWD/bin"
          "$PWD/bin/lus" -v

      - name: Strict run skipped (partial unstable)
        if: needs.resolve.outputs.tag == '' || !contains(needs.resolve.outputs.assets, format(',{0},', matrix.asset))
        run: echo "::warning::${{ matrix.asset }} is not in the current unstable (${{ needs.resolve.outputs.tag || 'no unstable release' }}) — that platform's build was skipped on the last main push; strict E2E skipped"

      # v1.6.0 is the first stable release with self-contained binaries
      # and a SHA256SUMS asset, so the pinned-stable run is fully strict:
      # it exercises tag pinning, checksum verification, and runs the
      # installed binary.
      - name: Install pinned stable (mechanics)
        shell: sh
        run: |
          sh lus-install/install.sh --version v1.6.0 --dir "$PWD/bin-pinned"
          test -x "$PWD/bin-pinned/lus"
          "$PWD/bin-pinned/lus" -v
