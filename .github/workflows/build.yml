name: CI

on:
  push:
    branches: [main]
    # Stable releases: pushing a v* tag runs the full pipeline and
    # the release job creates a draft release for it. paths filters
    # are not evaluated for tag pushes, so tags always build.
    tags: ["v*"]
    paths:
      - "lus/**"
      - "lus-tests/**"
      - "lus-spec/**"
      - "lus-vscode/package.json"
      - "CHANGELOG.md"
      - "scripts/**"
      - "lus-install/**"
      - ".github/workflows/build.yml"
  pull_request:
    branches: [main]
    paths:
      - "lus/**"
      - "lus-tests/**"
      - "lus-spec/**"
      - "lus-vscode/package.json"
      - "CHANGELOG.md"
      - "scripts/**"
      - "lus-install/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint checks run in parallel with tests
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: bash scripts/lint.sh

  # Platform-specific tests run in parallel
  test:
    name: Test (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container || null }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-glibc
            runner: ubuntu-latest
            suites: "--suite h1 --suite h2 --suite h3-ci --suite h4"
          - platform: linux-musl
            runner: ubuntu-latest
            container: alpine:latest
            suites: "--suite h1 --suite h2 --suite h4"
          - platform: macos-silicon
            runner: macos-14
            suites: "--suite h1 --suite h2 --suite h4"
          - platform: windows
            runner: windows-latest
            suites: "--suite h1 --suite h2 --suite h4"
    outputs:
      linux-glibc: ${{ steps.result.outputs.linux-glibc }}
      linux-musl: ${{ steps.result.outputs.linux-musl }}
      macos-silicon: ${{ steps.result.outputs.macos-silicon }}
      windows: ${{ steps.result.outputs.windows }}

    steps:
      - name: Install dependencies (Alpine)
        if: matrix.container == 'alpine:latest'
        run: apk add --no-cache build-base meson openssl-dev c-ares-dev zlib-dev zstd-dev brotli-dev lz4-dev git bash

      - name: Install dependencies (Ubuntu)
        if: matrix.runner == 'ubuntu-latest' && matrix.container == null
        run: |
          sudo apt-get update
          sudo apt-get install -y meson llvm libssl-dev libc-ares-dev zlib1g-dev libzstd-dev libbrotli-dev liblz4-dev

      - name: Install dependencies (macOS)
        if: matrix.runner == 'macos-14'
        run: brew install meson readline openssl c-ares zstd brotli lz4

      - name: Install dependencies (Windows)
        if: matrix.runner == 'windows-latest'
        run: |
          pip install meson ninja
          choco install pkgconfiglite --no-progress
          vcpkg install c-ares:x64-windows zlib:x64-windows zstd:x64-windows brotli:x64-windows lz4:x64-windows
          echo "PKG_CONFIG_PATH=${env:VCPKG_INSTALLATION_ROOT}\installed\x64-windows\lib\pkgconfig" >> $env:GITHUB_ENV
        env:
          VCPKG_DEFAULT_TRIPLET: x64-windows

      - name: Setup MSVC (Windows)
        if: matrix.runner == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (debug)
        run: |
          cd lus
          meson setup build-${{ matrix.platform }} --buildtype=debug
          meson compile -C build-${{ matrix.platform }} 'lus:executable'

      - name: Test
        run: meson test -C lus/build-${{ matrix.platform }} -v --print-errorlogs ${{ matrix.suites }}

      - name: Print test log on failure
        if: failure()
        run: cat lus/build-${{ matrix.platform }}/meson-logs/testlog.txt

      - name: Set result output
        id: result
        if: always()
        shell: bash
        run: echo "${{ matrix.platform }}=${{ job.status }}" >> $GITHUB_OUTPUT

  # Sanitizer build for memory safety validation
  sanitize:
    name: Sanitizers
    needs: [test, lint]
    if: always() && !cancelled()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson llvm libssl-dev libc-ares-dev zlib1g-dev libzstd-dev libbrotli-dev liblz4-dev

      - name: Build with sanitizers
        run: |
          cd lus
          meson setup build-sanitize --buildtype=debug -Db_sanitize=address,undefined -Db_lundef=false
          meson compile -C build-sanitize lus:executable

      - name: Test
        env:
          ASAN_OPTIONS: detect_leaks=0:print_stacktrace=1:symbolize=1
          UBSAN_OPTIONS: print_stacktrace=1:symbolize=1
        run: meson test -C lus/build-sanitize -v --print-errorlogs --maxfail=1 --suite h1 --suite h2 --suite h3-ci

      - name: Print test log on failure
        if: failure()
        run: cat lus/build-sanitize/meson-logs/testlog.txt

  # Platform-specific release builds (only for platforms that passed tests)
  build:
    name: Build (${{ matrix.platform }})
    needs: [test, lint]
    if: always() && !cancelled()
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container || null }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # pgo: two-phase profile-guided build (tools/pgo-build.sh).
          # Measured 15-45% faster on the VM micro-benchmarks and it
          # stabilizes the code layout of the dispatch loop. Not
          # supported for MSVC, so Windows ships a plain release.
          #
          # setup_args: release binaries are distributed bare (and by
          # the installers), so dependencies are linked statically —
          # meson's --prefer-static falls back to shared SILENTLY,
          # which is why every platform has a portability assertion
          # step after the build. musl ships fully static; Windows
          # uses the static CRT so no VC redistributable is needed.
          - platform: linux-glibc
            runner: ubuntu-latest
            artifact: lus-linux
            artifact_path: lus/build-linux-glibc/lus
            pgo: true
            setup_args: "--prefer-static"
          - platform: linux-musl
            runner: ubuntu-latest
            container: alpine:latest
            artifact: lus-linux-musl
            artifact_path: lus/build-linux-musl/lus
            pgo: true
            setup_args: "--prefer-static -Dc_link_args=-static"
          - platform: macos-silicon
            runner: macos-14
            artifact: lus-macos
            artifact_path: lus/build-macos-silicon/lus
            pgo: true
            setup_args: "--prefer-static"
          - platform: windows
            runner: windows-latest
            artifact: lus-windows
            artifact_path: lus/build-windows/lus.exe
            setup_args: "--prefer-static -Db_vscrt=mt"

    steps:
      - name: Install bash (Alpine)
        if: matrix.container == 'alpine:latest'
        run: apk add --no-cache bash

      - name: Check if test passed
        id: check
        shell: bash
        run: |
          case "${{ matrix.platform }}" in
            linux-glibc) result="${{ needs.test.outputs.linux-glibc }}" ;;
            linux-musl) result="${{ needs.test.outputs.linux-musl }}" ;;
            macos-silicon) result="${{ needs.test.outputs.macos-silicon }}" ;;
            windows) result="${{ needs.test.outputs.windows }}" ;;
          esac
          if [[ "$result" == "success" ]]; then
            echo "proceed=true" >> $GITHUB_OUTPUT
            echo "✅ Test for ${{ matrix.platform }} passed, proceeding with build"
          else
            echo "proceed=false" >> $GITHUB_OUTPUT
            echo "⏭️ Skipping build - test for ${{ matrix.platform }} did not pass (status: $result)"
          fi

      - name: Install dependencies (Alpine)
        if: steps.check.outputs.proceed == 'true' && matrix.container == 'alpine:latest'
        # c-ares has no -static subpackage; its -dev ships libcares.a
        run: apk add --no-cache build-base meson openssl-dev c-ares-dev zlib-dev zstd-dev brotli-dev lz4-dev git file openssl-libs-static zlib-static zstd-static brotli-static lz4-static

      - name: Install dependencies (Ubuntu)
        if: steps.check.outputs.proceed == 'true' && matrix.runner == 'ubuntu-latest' && matrix.container == null
        run: |
          sudo apt-get update
          sudo apt-get install -y meson libssl-dev libc-ares-dev zlib1g-dev libzstd-dev libbrotli-dev liblz4-dev

      - name: Install dependencies (macOS)
        if: steps.check.outputs.proceed == 'true' && matrix.runner == 'macos-14'
        run: brew install meson readline openssl c-ares zstd brotli lz4

      - name: Install dependencies (Windows)
        if: steps.check.outputs.proceed == 'true' && matrix.runner == 'windows-latest'
        # Static triplet: the released lus.exe must not depend on
        # vcpkg DLLs. openssl is listed explicitly — the dynamic
        # build resolved it from the runner image, which the static
        # link cannot rely on.
        run: |
          pip install meson ninja
          choco install pkgconfiglite --no-progress
          vcpkg install openssl:x64-windows-static c-ares:x64-windows-static zlib:x64-windows-static zstd:x64-windows-static brotli:x64-windows-static lz4:x64-windows-static
          echo "PKG_CONFIG_PATH=${env:VCPKG_INSTALLATION_ROOT}\installed\x64-windows-static\lib\pkgconfig" >> $env:GITHUB_ENV
        env:
          VCPKG_DEFAULT_TRIPLET: x64-windows-static

      - name: Setup MSVC (Windows)
        if: steps.check.outputs.proceed == 'true' && matrix.runner == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Checkout
        if: steps.check.outputs.proceed == 'true'
        uses: actions/checkout@v4

      - name: Build static c-ares (Linux glibc)
        if: steps.check.outputs.proceed == 'true' && matrix.platform == 'linux-glibc'
        # Ubuntu's libc-ares-dev ships no libcares.a — the one static
        # archive --prefer-static can't find on this platform (Alpine's
        # -dev has it, Homebrew's keg has it, vcpkg builds it). Build a
        # pinned release; PKG_CONFIG_PATH makes meson prefer it.
        run: |
          curl -fsSLO https://github.com/c-ares/c-ares/releases/download/v1.34.5/c-ares-1.34.5.tar.gz
          tar xzf c-ares-1.34.5.tar.gz
          cd c-ares-1.34.5
          ./configure --disable-shared --enable-static --prefix="$PWD/_install" >/dev/null
          make -j"$(nproc)" >/dev/null
          make install >/dev/null
          echo "PKG_CONFIG_PATH=$PWD/_install/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Build (release + PGO)
        if: steps.check.outputs.proceed == 'true' && matrix.pgo == true
        shell: bash
        run: lus/tools/pgo-build.sh build-${{ matrix.platform }} --buildtype=release ${{ matrix.setup_args }}

      - name: Build (release)
        if: steps.check.outputs.proceed == 'true' && matrix.pgo != true
        run: |
          cd lus
          meson setup build-${{ matrix.platform }} --buildtype=release ${{ matrix.setup_args }}
          meson compile -C build-${{ matrix.platform }} 'lus:executable'

      # Portability assertions: --prefer-static falls back to shared
      # libraries silently, so each platform proves the binary carries
      # no build-host dependencies before it can ship.
      - name: Assert portable binary (Linux glibc)
        if: steps.check.outputs.proceed == 'true' && matrix.platform == 'linux-glibc'
        run: |
          docker run --rm -v "$PWD/lus/build-linux-glibc:/b" -v "$PWD/lus-tests:/lus-tests" debian:stable-slim sh -c '
            ldd /b/lus
            if ldd /b/lus | grep -E "libssl|libcrypto|libcares|libzstd|libbrotli|liblz4|libz\.so"; then
              echo "::error::lus-linux links non-baseline shared libraries"; exit 1
            fi
            /b/lus -v
            cd / && /b/lus lus-tests/h1/calls.lus'

      - name: Assert portable binary (Linux musl)
        if: steps.check.outputs.proceed == 'true' && matrix.platform == 'linux-musl'
        run: |
          file lus/build-linux-musl/lus
          # Alpine gcc defaults to PIE, so -static yields "static-pie
          # linked" (still fully static, ASLR kept)
          file lus/build-linux-musl/lus | grep -qE 'statically linked|static-pie linked' || { echo "::error::lus-linux-musl is not fully static"; exit 1; }
          ./lus/build-linux-musl/lus -v

      - name: Assert portable binary (macOS)
        if: steps.check.outputs.proceed == 'true' && matrix.platform == 'macos-silicon'
        run: |
          otool -L lus/build-macos-silicon/lus
          if otool -L lus/build-macos-silicon/lus | grep -E '/opt/homebrew|/usr/local|@rpath'; then
            echo "::error::lus-macos links non-system dylibs"; exit 1
          fi
          ./lus/build-macos-silicon/lus -v
          ./lus/build-macos-silicon/lus lus-tests/h1/calls.lus

      - name: Assert portable binary (Windows)
        if: steps.check.outputs.proceed == 'true' && matrix.platform == 'windows'
        shell: pwsh
        run: |
          $deps = (dumpbin /dependents lus\build-windows\lus.exe) -join "`n"
          Write-Host $deps
          $forbidden = "zlib1.dll","zstd.dll","cares.dll","lz4.dll","brotli","libcrypto","libssl","VCRUNTIME","MSVCP","api-ms-win-crt"
          foreach ($f in $forbidden) {
            if ($deps -match [regex]::Escape($f)) { throw "lus.exe depends on $f - not self-contained" }
          }
          .\lus\build-windows\lus.exe -v
          .\lus\build-windows\lus.exe lus-tests\h1\calls.lus

      - name: Upload artifact
        if: steps.check.outputs.proceed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact_path }}

  # Windows installer (Inno Setup, preinstalled on the runner).
  # Wraps the lus-windows artifact in lus-setup.exe: per-user install
  # by default (no UAC), /ALLUSERS for machine-wide. The silent
  # install/uninstall round-trip is the regression test for the
  # PATH-editing Pascal code in lus-install/lus.iss.
  installer:
    name: Build (windows installer)
    needs: [test, build]
    if: always() && !cancelled() && needs.test.outputs.windows == 'success'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download lus-windows artifact
        uses: actions/download-artifact@v4
        with:
          name: lus-windows
          path: lus-install

      - name: Read version
        shell: bash
        # Trailing space in the patterns is load-bearing: without it
        # RELEASE_N also matches the LUA_VERSION_RELEASE_NUM define
        # (same idiom as scripts/lint.sh).
        run: echo "LUS_VER=$(awk '/^#define LUA_VERSION_MAJOR_N /{a=$3} /^#define LUA_VERSION_MINOR_N /{b=$3} /^#define LUA_VERSION_RELEASE_N /{c=$3} END{print a"."b"."c}' lus/src/lua.h)" >> "$GITHUB_ENV"

      - name: Compile installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DAppVer="$env:LUS_VER" /Olus-install\out lus-install\lus.iss

      - name: Silent install smoke test
        shell: pwsh
        run: |
          Start-Process -Wait lus-install\out\lus-setup.exe -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/LOG=setup.log'
          $exe = "$env:LOCALAPPDATA\Programs\Lus\lus.exe"
          if (-not (Test-Path $exe)) { Get-Content setup.log; throw "lus.exe not installed" }
          & $exe -v
          $userPath = (Get-ItemProperty HKCU:\Environment).Path
          if ($userPath -notlike "*\Programs\Lus*") { throw "user PATH not updated: $userPath" }

      - name: Silent uninstall test
        shell: pwsh
        # The Inno uninstaller relaunches itself from TEMP so it can
        # delete its own exe; the original process exits immediately,
        # so completion has to be polled. PATH cleanup runs in
        # usPostUninstall, after file removal.
        run: |
          Start-Process -Wait "$env:LOCALAPPDATA\Programs\Lus\unins000.exe" -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES'
          $deadline = (Get-Date).AddSeconds(90)
          while ($true) {
            $exeGone = -not (Test-Path "$env:LOCALAPPDATA\Programs\Lus\lus.exe")
            $userPath = (Get-ItemProperty HKCU:\Environment -ErrorAction SilentlyContinue).Path
            $pathClean = $userPath -notlike "*\Programs\Lus*"
            if ($exeGone -and $pathClean) { break }
            if ((Get-Date) -gt $deadline) { throw "uninstall incomplete: exeGone=$exeGone pathClean=$pathClean PATH=$userPath" }
            Start-Sleep -Seconds 2
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lus-setup
          path: lus-install/out/lus-setup.exe

  # WASM build (separate - no test dependency)
  build-wasm:
    name: Build (wasm)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.64

      - name: Build WASM
        run: |
          cd lus/wasm
          ./build.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lus-wasm
          path: lus/wasm/dist/

  # Test result summary
  summary:
    name: Summary
    needs: [test, sanitize, build, build-wasm, lint]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Generate summary
        run: |
          echo "## 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY

          # Test results
          for platform in linux-glibc linux-musl macos-silicon windows; do
            case "$platform" in
              linux-glibc) result="${{ needs.test.outputs.linux-glibc }}" ;;
              linux-musl) result="${{ needs.test.outputs.linux-musl }}" ;;
              macos-silicon) result="${{ needs.test.outputs.macos-silicon }}" ;;
              windows) result="${{ needs.test.outputs.windows }}" ;;
            esac
            if [[ "$result" == "success" ]]; then
              echo "| $platform | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
            elif [[ "$result" == "failure" ]]; then
              echo "| $platform | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $platform | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🔬 Sanitizers" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ needs.sanitize.result }}" == "success" ]]; then
            echo "✅ Memory safety checks passed" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.sanitize.result }}" == "failure" ]]; then
            echo "❌ Memory safety issues detected" >> $GITHUB_STEP_SUMMARY
          else
            echo "⏭️ Sanitizer checks skipped" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📦 Build Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ needs.build.result }}" == "success" ]]; then
            echo "✅ Release builds completed" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "⚠️ Some release builds failed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⏭️ Release builds skipped" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ needs.build-wasm.result }}" == "success" ]]; then
            echo "✅ WASM build completed" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.build-wasm.result }}" == "failure" ]]; then
            echo "❌ WASM build failed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⏭️ WASM build skipped" >> $GITHUB_STEP_SUMMARY
          fi

  # Create a release with available artifacts: a rolling unstable
  # pre-release on main pushes, a draft stable release on v* tags
  # (write the notes, then publish — publishing triggers the VSCode
  # extension workflow).
  release:
    name: Release
    needs: [build, build-wasm, installer]
    runs-on: ubuntu-latest
    if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) && !cancelled()
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Delete previous unstable releases
        if: github.ref == 'refs/heads/main'
        run: |
          # Get all releases starting with 'unstable-'
          releases=$(gh release list --json tagName --jq '.[] | select(.tagName | startswith("unstable-")) | .tagName' || true)

          for tag in $releases; do
            echo "Deleting old unstable release: $tag"
            gh release delete "$tag" --yes --cleanup-tag || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download available artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
        continue-on-error: true

      - name: Prepare release assets
        id: prepare
        run: |
          mkdir -p release
          count=0

          # Linux (glibc)
          if [ -f artifacts/lus-linux/lus ]; then
            cp artifacts/lus-linux/lus release/lus-linux
            echo "✅ linux-glibc artifact included"
            count=$((count + 1))
          else
            echo "⏭️ linux-glibc artifact not available"
          fi

          # Linux (musl)
          if [ -f artifacts/lus-linux-musl/lus ]; then
            cp artifacts/lus-linux-musl/lus release/lus-linux-musl
            echo "✅ linux-musl artifact included"
            count=$((count + 1))
          else
            echo "⏭️ linux-musl artifact not available"
          fi

          # macOS
          if [ -f artifacts/lus-macos/lus ]; then
            cp artifacts/lus-macos/lus release/lus-macos
            echo "✅ macos artifact included"
            count=$((count + 1))
          else
            echo "⏭️ macos artifact not available"
          fi

          # Windows
          if [ -f artifacts/lus-windows/lus.exe ]; then
            cp artifacts/lus-windows/lus.exe release/lus-windows.exe
            echo "✅ windows artifact included"
            count=$((count + 1))
          else
            echo "⏭️ windows artifact not available"
          fi

          # WASM
          if [ -f artifacts/lus-wasm/lus.web.js ]; then
            cp artifacts/lus-wasm/lus.web.js release/lus.web.js
            cp artifacts/lus-wasm/lus.node.js release/lus.node.js
            cp artifacts/lus-wasm/lus.wasm release/lus.wasm
            echo "✅ wasm artifacts included"
            count=$((count + 1))
          else
            echo "⏭️ wasm artifacts not available"
          fi

          # Windows installer
          if [ -f artifacts/lus-setup/lus-setup.exe ]; then
            cp artifacts/lus-setup/lus-setup.exe release/lus-setup.exe
            echo "✅ windows installer included"
            count=$((count + 1))
          else
            echo "⏭️ windows installer not available"
          fi

          echo "artifact_count=$count" >> $GITHUB_OUTPUT

          if [ $count -eq 0 ]; then
            echo "❌ No artifacts available for release"
            exit 1
          fi

          # Checksums over every asset (verified by install.sh)
          (cd release && sha256sum -- * > SHA256SUMS)

          echo ""
          echo "📦 Release contents ($count artifact sets):"
          ls -la release/
          cat release/SHA256SUMS

      - name: Create unstable release
        if: github.ref == 'refs/heads/main'
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"

          artifact_count="${{ steps.prepare.outputs.artifact_count }}"

          gh release create "unstable-${SHORT_SHA}" \
            --title "Unstable (${SHORT_SHA})" \
            --notes "Automated build from commit ${{ github.sha }}

          **Included artifact sets:** ${artifact_count}/6 available

          > ⚠️ This is an unstable pre-release build. Use at your own risk." \
            --prerelease \
            release/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create stable draft release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Lus ${GITHUB_REF_NAME#v}" \
            --draft \
            --notes "Draft — write the release notes, then publish." \
            release/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
